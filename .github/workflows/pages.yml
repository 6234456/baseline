name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Publish gh-pages branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          publish_dir="$(mktemp -d)"
          cp -R dist/. "$publish_dir"/
          touch "$publish_dir/.nojekyll"

          git -C "$publish_dir" init
          git -C "$publish_dir" checkout -b gh-pages
          git -C "$publish_dir" config user.name "github-actions[bot]"
          git -C "$publish_dir" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C "$publish_dir" add -A
          git -C "$publish_dir" commit -m "Deploy GitHub Pages"
          git -C "$publish_dir" push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
